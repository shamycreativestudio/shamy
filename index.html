<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Shamy Creative Studio</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta
      name="description"
      content="Shamy] Creative Studio - Diseño de marca y estrategia creativa"
    />
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Onest:wght@400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body>
    <div class="container">
      <header class="hero">
        <img src="assets/img/logo.svg" alt="Shamy Creative Studio" class="logo" />
        <h1 data-i18n="hero.title">Shamy Creative Studio</h1>
        <p class="tagline" data-i18n="hero.tagline">
          branding · coding · animating · drawing · modeling
        </p>
        <div class="filters">
          <button
            class="filter-btn active"
            data-filter="all"
            data-i18n="nav.all"
          >
            All
          </button>
          <button
            class="filter-btn"
            data-filter="branding"
            data-i18n="nav.branding"
          >
            Branding
          </button>
          <button
            class="filter-btn"
            data-filter="coding"
            data-i18n="nav.coding"
          >
            Coding
          </button>
          <button
            class="filter-btn"
            data-filter="animating"
            data-i18n="nav.animating"
          >
            Animating
          </button>
          <button
            class="filter-btn"
            data-filter="drawing"
            data-i18n="nav.drawing"
          >
            Drawing
          </button>
          <button
            class="filter-btn"
            data-filter="modeling"
            data-i18n="nav.modeling"
          >
            Modeling
          </button>
          <button
            class="filter-btn"
            data-filter="modeling"
            data-i18n="nav.modeling"
          >
            Modeling
          </button>
        </div>
      </header>

        <!-- Portfolio Grid -->
        <div class="portfolio-grid" id="portfolioGrid">
          <!-- Projects will be injected here by JS -->
        </div>

        <!-- CTA Section -->
        <section class="cta-section">
          <h2 data-i18n="cta.title">Interested in working together?</h2>
          <a href="branding/" class="btn-primary" data-i18n="cta.button"
            >Start a project →</a
          >
        </section>
      </main>

      <footer class="footer">
        <small data-i18n="footer.copyright"
          >&copy; 2025 Shamy]™ Creative Studio.</small
        >
      </footer>
    </div>

    <!-- Lightbox Modal -->
    <div class="modal" id="lightbox">
      <button class="close-modal">&times;</button>
      <img src="" alt="Full view" class="lightbox-img" id="lightboxImg" />
    </div>

    <!-- Project Details Modal -->
    <div class="modal" id="projectModal">
      <button class="close-modal">&times;</button>
      <div class="project-modal-content">
        <div class="modal-content-body">
          <!-- Content injected by JS -->
        </div>
      </div>
    </div>

    <script src="assets/js/ui-core.js"></script>
    <script src="assets/js/portfolio.js"></script>
  </body>
</html>
