<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Shamy Creative Studio</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta
      name="description"
      content="Shamy] Creative Studio - Diseño de marca y estrategia creativa"
    />
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Onest:wght@400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body>
    <div class="container">
      <header class="hero">
        <img
          src="assets/img/shamy-logotipo.svg"
          alt="Shamy Creative Studio"
          class="logo"
        />
        <h1>shamy] portfolio</h1>
        <p class="tagline">
          branding · coding · animating · drawing · modeling
        </p>
      </header>

      <main class="content">
        <!-- Filters -->
        <div class="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="branding">Branding</button>
          <button class="filter-btn" data-filter="coding">Coding</button>
          <button class="filter-btn" data-filter="animating">Animating</button>
          <button class="filter-btn" data-filter="drawing">Drawing</button>
          <button class="filter-btn" data-filter="modeling">Modeling</button>
        </div>

        <!-- Portfolio Grid -->
        <div class="portfolio-grid" id="portfolioGrid">
          <!-- Projects will be injected here by JS -->
        </div>

        <!-- CTA Section -->
        <section class="cta-section">
          <h2>Interested in working together?</h2>
          <a href="branding/" class="btn-primary">Start a Project →</a>
        </section>
      </main>

      <footer class="footer">
        <small>&copy; 2025 Shamy]™ Creative Studio.</small>
      </footer>
    </div>

    <!-- Lightbox Modal -->
    <div class="modal" id="lightbox">
      <button class="close-modal">&times;</button>
      <img src="" alt="Full view" class="lightbox-img" id="lightboxImg" />
    </div>

    <!-- Project Details Modal -->
    <div class="modal" id="projectModal">
      <button class="close-modal">&times;</button>
      <div class="project-modal-content">
        <div class="modal-content-body">
          <!-- Content injected by JS -->
        </div>
      </div>
    </div>

    <script src="assets/js/portfolio.js"></script>
  </body>
</html>
